spring:
  application:
    name: controle-veiculo
  security:
    user:
      name: admin
      password: admin123
  datasource:
    url: jdbc:h2:mem:controle_veiculo_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

resilience4j:
  circuitbreaker:
    instances:
      cotacaoCB:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        record-exceptions:
          - java.lang.Exception
      cotacaoFallbackCB:
        sliding-window-size: 3
        failure-rate-threshold: 100
        wait-duration-in-open-state: 10s
        record-exceptions:
          - java.lang.Exception

