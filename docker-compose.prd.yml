services:
  db:
    image: postgres:16-alpine
    container_name: controle-veiculo-db
    environment:
      POSTGRES_DB: controle_veiculo
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d controle_veiculo"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    container_name: controle-veiculo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controle-veiculo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SECURITY_USER: ${SECURITY_USER:-user}
      SECURITY_PASSWORD: ${SECURITY_PASSWORD:-user123}
      DB_URL: jdbc:postgresql://db:5432/controle_veiculo
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      JPA_SHOW_SQL: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
